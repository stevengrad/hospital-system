version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: hospital-php
    restart: unless-stopped
    environment:
      DB_HOST: database-1.c7q2cy4m6u0p.eu-central-1.rds.amazonaws.com
      DB_PORT: 3306
      DB_NAME: hospital_system
      DB_USER: mysqldb2026
      DB_PASSWORD: mysqldb2026

      SMTP_USER: cairohospitals0@gmail.com
      SMTP_PASS: dnpoxjybarrdwhxd

      # Local Docker container URLs
      # PHP container calls chatbot container by service name: chatbot
      CHATBOT_API_URL: http://chatbot:8000/chat/free
      CHATBOT_FEEDBACK_URL: http://chatbot:8000/chat/feedback
      CHATBOT_BOOK_URL: http://chatbot:8000/chat/book

      # Face API local container URLs
      FACE_API_URL: http://face-api:5001/face/register_face
      FACE_REGISTER_URL: http://face-api:5001/face/register_face
      FACE_VERIFY_URL: http://face-api:5001/face/verify_face
      FACE_RELOAD_URL: http://face-api:5001/face/reload_db
      FACE_DELETE_URL: http://face-api:5001/face/delete_user

      # OCR local container URL
      OCR_API_URL: http://ocr-api:5050/ocr/extract-id

    depends_on:
      - chatbot
      - face-api
      - ocr-api

    volumes:
      - .:/var/www/html

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: hospital-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - php
      - chatbot
      - face-api
      - ocr-api
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  chatbot:
    build:
      context: ./hospital-assistant-python
      dockerfile: Dockerfile
    container_name: hospital-chatbot
    restart: unless-stopped
    environment:
      MYSQL_URL: mysql+pymysql://mysqldb2026:mysqldb2026@database-1.c7q2cy4m6u0p.eu-central-1.rds.amazonaws.com:3306/hospital_system
      SLOT_MINUTES: 30

      STT_MODEL: openai/whisper-small
      VOICE_MAX_MB: 25

      PRESCRIPTION_UPLOAD_DIR: /app/uploads/prescriptions
      PRESCRIPTION_MAX_MB: 15
      PRESCRIPTION_OCR_MAX_PDF_PAGES: 3
      PRESCRIPTION_OCR_GPU: "false"

      CHATBOT_STATE_DIR: /app/.chat_state
      CHATBOT_MEMORY_DIR: /app/.chat_memory
      CHATBOT_MEMORY_MAX_HISTORY: 12

    ports:
      - "8000:8000"

    volumes:
      - ./hospital-assistant-python:/app

  face-api:
    build:
      context: "./FFace_Recognition_System _Depi_stud"
      dockerfile: Dockerfile
    container_name: hospital-face-api
    restart: unless-stopped
    environment:
      FACE_S3_BUCKET: cairo-hospital-face-images-137068224200
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FACE_S3_PREFIX: faces

      FACE_MODEL_NAME: Facenet
      FACE_DETECTOR_BACKEND: opencv
      FACE_DISTANCE_METRIC: cosine
      FACE_THRESHOLD: 0.40

    ports:
      - "5001:5001"

  ocr-api:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: hospital-ocr-api
    restart: unless-stopped
    ports:
      - "5050:5050"